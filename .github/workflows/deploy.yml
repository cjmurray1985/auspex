name: Deploy (GitHub Pages)

# Auto-updating preview deploy for end-of-sprint demos (HITL Gate 2).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish (don't cancel a deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (Pages base path)
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Assemble site (Draft Academy under /draft-academy/)
        run: |
          rm -rf _site
          mkdir -p _site/draft-academy
          cp -r dist/* _site/draft-academy/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>Auspex</title>
              <meta http-equiv="refresh" content="0; url=./draft-academy/" />
              <link rel="canonical" href="./draft-academy/" />
              <link rel="icon" type="image/png" href="./draft-academy/auspex-logo.png" />
            </head>
            <body style="background:#05070f">
              <a href="./draft-academy/">Enter the Draft Academy</a>
            </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
